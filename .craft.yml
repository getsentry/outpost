minVersion: '2.21.1'
changelog:
  policy: auto
versioning:
  policy: auto
# Custom version bump — bypasses craft's built-in npm-based auto-bumping.
# See scripts/bump-version.sh for details.
preReleaseCommand: bash scripts/bump-version.sh
artifactProvider:
  name: github
  config:
    artifacts:
      CI: npm-tarball
targets:
  # Publish the openhealer package to npm.
  - name: npm
    access: public
    oidc: true
    includeNames: /^openhealer-\d.*\.tgz$/
  - name: github
