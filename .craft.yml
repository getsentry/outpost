minVersion: '2.21.1'
changelog:
  policy: auto
versioning:
  policy: auto
# Custom version bump — bypasses craft's built-in npm-based auto-bumping.
# See scripts/bump-version.sh for details.
preReleaseCommand: bash scripts/bump-version.sh
artifactProvider:
  name: github
  config:
    artifacts:
      CI: npm-tarball
targets:
  # Publish the opentower package to npm.
  - name: npm
    access: public
    oidc: true
    includeNames: /^opentower-\d.*\.tgz$/
  # Re-tag the sandbox Docker image (built+pushed earlier in the workflow)
  # with the release version. This is the lean image used by Cloudflare
  # Containers for per-entity sandboxes.
  - name: docker
    id: sandbox-versioned
    source: ghcr.io/mathuraditya724/outpost-sandbox
    target: ghcr.io/mathuraditya724/outpost-sandbox
  - name: docker
    id: sandbox-latest
    source: ghcr.io/mathuraditya724/outpost-sandbox
    target:
      image: ghcr.io/mathuraditya724/outpost-sandbox
      format: "{{{image}}}:latest"
  # Legacy monolith image (kept for backwards compatibility).
  - name: docker
    id: versioned
    source: ghcr.io/mathuraditya724/outpost
    target: ghcr.io/mathuraditya724/outpost
  - name: docker
    id: latest
    source: ghcr.io/mathuraditya724/outpost
    target:
      image: ghcr.io/mathuraditya724/outpost
      format: "{{{image}}}:latest"
  - name: github
