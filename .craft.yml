minVersion: '2.21.1'
changelog:
  policy: auto
versioning:
  policy: auto
# Custom version bump — bypasses craft's built-in npm-based auto-bumping.
# See scripts/bump-version.sh for details.
preReleaseCommand: bash scripts/bump-version.sh
artifactProvider:
  name: github
  config:
    artifacts:
      CI: npm-tarball
targets:
  # Publish the lantern package to npm.
  - name: npm
    access: public
    oidc: true
    includeNames: /^lantern-\d.*\.tgz$/
  # Re-tag the Docker image (built+pushed earlier in the workflow) with
  # the release version. The source image is tagged with the git SHA;
  # craft copies it to the versioned tag and :latest.
  - name: docker
    id: versioned
    source: ghcr.io/mathuraditya724/my-opencode
    target: ghcr.io/mathuraditya724/my-opencode
  - name: docker
    id: latest
    source: ghcr.io/mathuraditya724/my-opencode
    target:
      image: ghcr.io/mathuraditya724/my-opencode
      format: "{{{image}}}:latest"
  - name: github
