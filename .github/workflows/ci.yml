name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm biome check .

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo build

      - name: Typecheck
        run: pnpm tsc --noEmit
        working-directory: apps/server

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm turbo build --filter='@jared/server^...'

      - name: Run tests
        run: pnpm --filter @jared/server run test

  build:
    name: Build
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo build

  ci-status:
    name: CI Status
    if: always()
    needs:
      - lint
      - typecheck
      - test
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Check CI result
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "CI failed or was cancelled"
          exit 1
