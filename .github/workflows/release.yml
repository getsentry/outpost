# Unified release workflow: Docker image + npm package + GitHub release.
#
# Triggered via the Actions tab → "Run workflow". Builds and pushes the
# Docker image tagged with the git SHA, packs the lantern npm tarball,
# then runs craft which:
#   1. Publishes lantern to npm (OIDC auth)
#   2. Re-tags the Docker image with the release version + :latest
#   3. Creates a GitHub Release with auto-generated changelog
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (semver, "auto", or "major"/"minor"/"patch")'
        required: false
      force:
        description: Force a release even when there are release-blockers
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    name: build, push, publish
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      packages: write
      id-token: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # --- Docker image build + push (tagged with git SHA) ---

      - name: Lowercase image name
        id: image
        run: |
          echo "name=$(printf '%s' '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (SHA tag)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: |
            type=gha
            type=gha,scope=release
          cache-to: type=gha,mode=max,scope=release
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      # --- Pack lantern npm tarball ---

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Pack lantern
        run: |
          cd packages/lantern
          bun install
          bun pm pack --destination ../../

      # --- Craft: npm publish + Docker retag + GitHub Release ---

      - uses: getsentry/craft@v2
        with:
          version: ${{ inputs.version }}
          force: ${{ inputs.force }}
          publish_repo: self
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
